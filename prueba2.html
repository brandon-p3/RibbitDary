<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Maps Example</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
  </head>
  <style>
    #mi_mapa {
      height: 500px;
      width: 100%;
    }
  </style>
  <body>
    <div id="mi_mapa"></div>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <script>
      // Crea el mapa inicial
      let map = L.map("mi_mapa").setView([21.47268, -101.22288], 15);

      // Añade la capa de OpenStreetMap
      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution:
          '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      }).addTo(map);

      // Obtiene la ubicación del usuario
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function (position) {
          const userLocation = [position.coords.latitude, position.coords.longitude];

          // Centra el mapa en la ubicación actual del usuario
          map.setView(userLocation, 15);

          // Añade un marcador en la ubicación actual del usuario
          L.marker(userLocation)
            .addTo(map)
            .bindPopup("Estás aquí")
            .openPopup();
        }, 
        function () {
          alert("No se pudo obtener tu ubicación.");
        });
      } else {
        alert("Geolocalización no soportada por tu navegador.");
      }

      // Supón que estas son las ubicaciones de otros usuarios (esto debería venir de un servidor)
      const otrasUbicaciones = [
        { lat: 21.47468, lng: -101.22290, nombre: "Usuario 1" },
        { lat: 21.47100, lng: -101.22330, nombre: "Usuario 2" }
      ];

      // Añade marcadores para los otros usuarios
      otrasUbicaciones.forEach((usuario) => {
        L.marker([usuario.lat, usuario.lng])
          .addTo(map)
          .bindPopup(`${usuario.nombre} está aquí`)
          .openPopup();
      });

      // Evento de clic en el mapa
      map.on("click", function (e) {
        alert(`Has clickeado en la posición ${e.latlng.toString()}`);
      });
    </script>
  </body>
</html>
